<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #4285f4;
      --red: #ea4335;
      --yellow: #fbbc05;
      --bar-border: #dfe1e5;
      --bar-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
      --bar-shadow-hover: 0 1px 6px rgba(32, 33, 36, 0.35);
      --icon-muted: #5f6368;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      font-family: "DM Sans", system-ui, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo {
      margin: 0 0 2.25rem;
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .logo .c1 { color: var(--blue); }
    .logo .c2 { color: var(--red); }
    .logo .c3 { color: var(--yellow); }
    .logo .c4 { color: var(--blue); }

    .search-form {
      width: 100%;
      max-width: 600px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      height: 48px;
      padding: 0 15px;
      border: 1px solid var(--bar-border);
      border-radius: 9999px;
      background: #fff;
      box-shadow: var(--bar-shadow);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .search-bar:hover,
    .search-bar:focus-within {
      box-shadow: var(--bar-shadow-hover);
      border-color: rgba(223, 225, 229, 0.8);
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--icon-muted);
      cursor: pointer;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      color: #202124;
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .search-bar input[type="search"] {
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      border: none;
      outline: none;
      font: inherit;
      font-size: 1rem;
      color: #202124;
      background: transparent;
    }

    .search-bar input[type="search"]::placeholder {
      color: #70757a;
    }

    .search-bar input[type="search"]::-webkit-search-decoration,
    .search-bar input[type="search"]::-webkit-search-cancel-button {
      appearance: none;
    }

    .trailing {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-shrink: 0;
    }

    .trailing .icon-btn svg {
      display: block;
    }

    .ai-mode {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-left: 0.25rem;
      padding: 0.35rem 0.65rem;
      border: none;
      border-radius: 9999px;
      background: #f1f3f4;
      color: #202124;
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    .ai-mode:hover {
      background: #e8eaed;
    }

    .ai-mode:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="logo" aria-label="Demo">
      <span class="c1">D</span><span class="c2">e</span><span class="c3">m</span><span class="c4">o</span>
    </h1>

    <form class="search-form" role="search" action="#" method="get">
      <div class="search-bar">
        <button type="button" class="icon-btn" aria-label="Add">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
        <input type="search" name="q" placeholder="" autocomplete="off" aria-label="Search" />
        <div class="trailing">
          <button type="button" class="icon-btn" aria-label="Search by voice">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
            </svg>
          </button>
          <button type="button" class="icon-btn" aria-label="Search by image">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2.5" ry="2.5" />
              <circle cx="8.5" cy="10.5" r="1.8" fill="currentColor" stroke="none" />
              <path d="M21 15l-4.35-4.35a1 1 0 00-1.4 0l-5.3 5.3a1 1 0 01-1.4 0L5 12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button type="button" class="ai-mode" aria-label="AI Mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 6l.6 1.8L7.5 8.5l-1.9.7L5 11l-.6-1.8L2.5 8.5l1.9-.7L5 6z" fill="#1a73e8" opacity="0.45" />
              <path d="M17 4l.4 1.2L18.5 5.7l-1.3.5L17 7.3l-.4-1.2L15.5 5.7l1.3-.5L17 4z" fill="#1a73e8" opacity="0.55" />
              <circle cx="10.5" cy="11.5" r="4.25" stroke="#1a73e8" stroke-width="1.6" />
              <path d="M13.7 14.7L18 19" stroke="#1a73e8" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            AI Mode
          </button>
        </div>
      </div>
    </form>
  </div>
</body>
</html>
